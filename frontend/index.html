<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Emotion Detection</title>
	<!-- Bootstrap CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="styles.css">
</head>

<body class="d-flex justify-content-center align-items-center">

	<div class="card p-4 text-center" style="width: 400px;">
		<h1 class="card-title mb-4">Emotion Detection</h1>
		<p class="card-text mb-4">Upload an image to detect the emotion!</p>

		<form id="uploadForm">
			<div class="mb-3">
				<input type="file" class="form-control" id="imageInput" accept="image/*">
			</div>

			<!-- Image preview container -->
			<div class="image-preview-container mb-3" id="imagePreviewContainer">
				<img id="previewImage" class="image-preview" src="" alt="Image Preview">
			</div>

			<div class="d-grid gap-2">
				<button type="submit" class="btn btn-primary" id="predictButton">Detect Emotion</button>
			</div>
		</form>

		<div id="result" class="mt-4 fw-bold"></div>
	</div>

	<!-- Bootstrap JS -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<script src="scripts.js"></script>
</body>

</html>
